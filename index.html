<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page Title -->
    <title>Login - RinkSync</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/main.css">

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap" rel="stylesheet">
    
    <!-- Boot-Icon -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Preload -->
     <link rel="preload" href="typewriter.js">
     <link rel="preload" href="snow.js">
     <link rel="preload" href="css/main.css">

    
</head>

<style>

    /* FONT */
    .audiowide-regular {
        font-family: "Audiowide", sans-serif;
        font-weight: 400;
        font-style: normal;
    }

    body {
        background-color: rgb(10, 74, 138);
    }
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }


    .pg-container {
        display: flex;
        flex-direction: column;
        gap: 4vh;
        max-width: 420px;
        width: 90%;
        height: 60vh;
        border-radius: 1rem;
        margin: 0 auto;
        margin-top: 15vh;
    }

    .pg-container > img {
        width: 150px;
        height: 150px;
        border-radius: 50%;
        /* background-color: aqua; */
        margin: auto;
        /* box-shadow: 0 0 1em black; */
        filter: drop-shadow(0 0 4px black);
    }

    .form-container {
        padding: 60px 20px;
        border-radius: 1rem;
        margin: auto;
        justify-content: center;

        /* GLASS MORPHISM */
        background: rgba(255,255,255,0.1);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        border-radius: 20px;
        border: 1px solid rgba(255,255,255,0.3);
        box-shadow: 
            0 8px 32px rgba(0, 0, 0, 0.1),
            inset 0 1px 0 rgba(255,255,255, 0.5),
            inset 0 -1px 0 rgba(255,255,255,0.1),
            inset 0 0 20px 10px rgba(255,255,255,0);
        
        position: relative;
        overflow: hidden;
        z-index: 10;
    }

    .form-container::before {
        content: '';
        top: 0;
        left: 0;
        right: 0;
        height: 1px;
        background: linear-gradient(
            90deg,
            transparent,
            rgba(255,255,255,0.8),
            transparent
        );
    }

    .form-container::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 1px;
        height: 100%;
        background: linear-gradient(
            180deg,
            rgba(255,255,255,0.8),
            transparent,
            rgba(255,255,255,0.3)
        );
    }

    .form-container > h1 {
        font-family: "Audiowide";
        font-size:38px;
        width: 90%;
        margin: auto;
        border-bottom: 2px solid white;
        padding-bottom: 10px;
        font-weight: 100;
        text-align: center;
        color: white;
        /* margin-top: 2vh; */
    }

    .form-container > form {
        display: flex;
        flex-direction: column;
        gap: 4vh;
        margin-top: 4vh;
    }

    .form-setting > span > label {
        font-size: 22px;
        font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        font-weight: 100;
        padding-left: 10px;
    }

    .form-setting > span {
        margin-left: 1vw;
    }

    .form-setting > span > i {
        font-size: 22px;
    }

    .form-setting > i {
        font-size: 22px;
    }

    .form-setting > input {
        font-size: 22px;
        font-family: Arial, Helvetica, sans-serif;
        font-weight: 200;
        padding: 5px;
        /* border-radius: 5px; */
        /* border: 1px solid #2222224d; */
        max-width: 90%;
        margin: auto;
        transition: all 0.3s ease-in-out; 
        background: transparent;
        border: none;
        border-bottom: 2px solid white;
        color: white;

    }

    input:focus, select:focus {
        outline: none;
    }

    .form-setting > input::placeholder {
        color: white;
    }

    .form-setting > input:hover {
        transform: scale(1.05);
    }

    .form-setting > button {
        text-align: center;
        margin: auto;
        padding: 10px 90px;
        border-radius: 1rem;
        background: #0a73db;
        color: white;
        transition: all 0.3s ease-in-out;
        font-family: "Audiowide";
        font-size: 18px;
    }

    .form-setting > button:hover {
        transform: scale(1.1);
    }

        .form-setting > button {

        /* BUTTON SETTING */

        /* GLASS MORPHISM */
        background: rgba(255,255,255,0.1);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        border-radius: 20px;
        border: 1px solid rgba(255,255,255,0.3);
        box-shadow: 
            0 8px 32px rgba(0, 0, 0, 0.1),
            inset 0 1px 0 rgba(255,255,255, 0.5),
            inset 0 -1px 0 rgba(255,255,255,0.1),
            inset 0 0 20px 10px rgba(255,255,255,0);
        cursor: pointer;
    }

   /* Snow container */
#snow-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    /* z-index: 9999; */
    z-index: 0;
}

/* Individual snowflake */
.snowflake {
    position: absolute;
    top: -20px;
    color: white;
    user-select: none;
    animation-name: snowfall;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
    opacity: 0.9;
    /* text-shadow: 0 0 5px rgba(255,255,255,0.8); */
}

@keyframes snowfall {
    0% {
        transform: translateY(-20px) translateX(0);
    }

    25% {
        transform: translateY(25vh) translateX(15px);
    }

    50% {
        transform: translateY(50vh) translateX(-15px);
    }

    75% {
        transform: translateY(75vh) translateX(20px);
    }

    100% {
        transform: translateY(110vh) translateX(-10px);
    }
}

  .tw {
    font-size:37px;
    font-family: "Audiowide";
    color: #e2e8f0;
    font-weight:100;
    width: 90%;
    margin: auto;
    /* border-bottom: 2px solid white; */
    padding-bottom: 10px;
    text-align: center;
    /* margin-top: 2vh; */
}

    #cursor {
  animation: blink 0.7s step-end infinite;
}

    .tw .cursor {
    color: #e2e8f0;
    animation:blink 1s steps(1) infinite
}

.input-container {
    position: relative;
    margin-bottom: 15px;
    text-align: center;
}

.input-container i {
    position: absolute;
    right: 20px;
    align-self: center;
    transform: translateY(1px solid #ccc);
    border-radius: 4px;
    font-size: 24px;
    color: white;
    pointer-events: none;
    /* Smoothly animate changes over 0.3 seconds */
    transition: opacity 0.1s ease-in-out; 
    opacity: 1; /* Fully visible by default */
}

.input-field {
    font-size: 22px;
    font-family: Arial, Helvetica, sans-serif;
    font-weight: 200;
    padding: 5px;
    max-width: 90%;
    margin: auto;
    transition: all 0.3s ease-in-out; 
    background: transparent;
    border: none;
    border-bottom: 2px solid white;
    color: white;
    cursor: pointer;

}

.input-field::placeholder {
    color: white;
}

.input-container input:focus + i {
    /* display: none; */
    opacity: 0;
}

button:focus, select:focus {
        outline: none;
    }




</style>

<body>

<div id="snow-container"></div>


    <!-- PAGE SETUP -->
    <div class="pg-container">

        <!-- PROGRAM LOGO -->
        <!-- <img src="img/logo/RinkSync Logo.png" alt=""> -->

        <!-- FORM CONTAINER -->
        <div class="form-container">

            <!-- FORM TITLE -->
            <div class="tw"><span id="t"></span><span class="cursor">|</span></div>
            <!-- <h1>Rink-Sync</h1> -->

            <form action="" method="post" class="form-setting">

                <!-- USERNAME -->
                 <div class="input-container">
                <input type="text" placeholder="Username..." class="input-field" required>
                <i class="bi bi-person" id="myIcon" class="input-icon"></i>
                </div>

                <!-- PASSWORD -->
                 <div class="input-container">
                <input type="password" placeholder="Password..." class="input-field" required>
                <i class="bi bi-lock" id="myIcon"></i>
                </div>

                <!-- SUBMIT BUTTON -->
                <button type="submit">Login</button>

            </form>
        </div>
    </div>






<script src="typewriter.js"></script>
<script src="snow.js"></script>

</body>
</html>
