    <link rel="stylesheet" href="assets/css/style.css">

    <!-- Font -->

    <!-- Preload -->

<style>







</style>

<body>

<div id="snow-container"></div>


    <!-- PAGE SETUP -->
    <div class="pg-container">

        <!-- PROGRAM LOGO -->
        <!-- <img src="img/logo/RinkSync Logo.png" alt=""> -->

        <!-- FORM CONTAINER -->
        <div class="form-container">

            <!-- FORM TITLE -->
            <div class="tw"><span id="t"></span><span class="cursor">|</span></div>
            <!-- <h1>Rink-Sync</h1> -->

            <form action="" method="post" class="form-setting">

                <!-- USERNAME -->
                 <div class="input-container">
                <input type="text" placeholder="Username..." class="input-field" required>
                <i class="bi bi-person" id="myIcon" class="input-icon"></i>
                </div>

                <!-- PASSWORD -->
                 <div class="input-container">
                <input type="password" placeholder="Password..." class="input-field" required>
                <i class="bi bi-lock" id="myIcon"></i><br>
                </div>

                <!-- SUBMIT BUTTON -->
                <button type="submit">Login</button>
                <div class="footer-container">
                <span><p>don't have an account?<a href="register.html" class="signup-btn"> Sign up</a></p></span>
                <a class="forgot-btn">forgot password?</a>
                </div>

            </form>
        </div>
    </div>






<script src="assets/js/typewriter.js"></script>
