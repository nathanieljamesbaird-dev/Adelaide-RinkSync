<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page Title -->
    <title>Login - RinkSync</title>

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/dashboard.css">

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap" rel="stylesheet">
    
    <!-- Boot-Icon -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Preload -->
     <link rel="preload" href="assets/css/dashboard.css">

    
</head>

<style>

     /* FONT */
    .audiowide-regular {
        font-family: "Audiowide", sans-serif;
        font-weight: 400;
        font-style: normal;
    }

    body {
        background-color: rgb(10, 74, 138);
    }
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

        .form-container {
        top: 3vh;
        padding: 60px 20px;
        border-radius: 1rem;
        margin: auto;
        justify-content: center;

        /* GLASS MORPHISM */
        background: rgba(255,255,255,0.1);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        border-radius: 20px;
        border: 1px solid rgba(255,255,255,0.3);
        box-shadow: 
            0 8px 32px rgba(0, 0, 0, 0.1),
            inset 0 1px 0 rgba(255,255,255, 0.5),
            inset 0 -1px 0 rgba(255,255,255,0.1),
            inset 0 0 20px 10px rgba(255,255,255,0);
        
        position: relative;
        overflow: hidden;
        z-index: 10;
    }

    .form-container::before {
        content: '';
        top: 0;
        left: 0;
        right: 0;
        height: 1px;
        background: linear-gradient(
            90deg,
            transparent,
            rgba(255,255,255,0.8),
            transparent
        );
    }

    .form-container::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 1px;
        height: 100%;
        background: linear-gradient(
            180deg,
            rgba(255,255,255,0.8),
            transparent,
            rgba(255,255,255,0.3)
        );
    }

    .page-container {
        width: 60vw;
        margin: auto;
        margin-top: 10vh;
    }

    .form-container > h1 {
        color: white;
        font-family: "Audiowide";
        font-weight: 100;
        padding-left: 10px;
    }

    .header-container > h1 {
        color: white;
        font-family: "Audiowide";
        font-size: 32px;
        font-weight: 100;
        align-self: center;
    }

    .header-container > h1 > span {
        color: #00e5a0;

    }

    .header-container {
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        /* background: red; */
    }

    .header-right {
        display: flex;
        flex-direction: row;
        gap: 1vw;
        align-self: center;
    }

    .header-right a {
        color: red;
        font-family: "Audiowide";
        align-self: center;
        padding-right: 10px;
    }

    .header-right > button {
        background: none;
        border: none;
    }
    
    .header-right > button > img {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: white;
    }


    .info-card {
        /* GLASS MORPHISM */
        padding: 40px 40px;
        background: rgba(255,255,255,0.1);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        border-radius: 20px;
        border: 1px solid rgba(255,255,255,0.3);
        box-shadow: 
            0 8px 32px rgba(0, 0, 0, 0.1),
            inset 0 1px 0 rgba(255,255,255, 0.5),
            inset 0 -1px 0 rgba(255,255,255,0.1),
            inset 0 0 20px 10px rgba(255,255,255,0);
        
        position: relative;
        overflow: hidden;
        z-index: 10;
    }

    .info-card-grid {
        display: flex;
        flex-direction: row;
        gap: 1.5vw;
    }


</style>

<body>




    <div class="page-container">

        <!-- WELCOME HEADER -->
        <div class="header-container">
        <h1>Welcome, <span>Nathaniel Baird</span></h1>


        <!-- PROFILE MODAL/CUSTOMIZE -->
            <div class="header-right">
                <a><i class="bi bi-arrow-left"></i> Logout</a>
                <button><img src="" alt=""></button>
            </div>
        </div>

        <div class="info-card-grid">

        <!-- CARD -->
        <div class="info-card">

        <!-- TITLE OF CARD -->
        <div class="info-title-card">
            <i class="bi bi-clock"></i>
            SESSION
        </div>

        <!-- CONTENT OF CARD -->
         <div class="info-card-content">
            <h4>47 min</h4>
         </div>

        <!-- FOOTER OF CARD -->
          <div class="info-card-footer">
            left in your session
          </div>

          <!-- INDICATION -->
          <div class="info-card-indie">
            <div class="cirlce-card"></div>
                On the ice
          </div>

           

</body>
</html>
