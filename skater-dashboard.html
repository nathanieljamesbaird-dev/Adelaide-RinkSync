<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page Title -->
    <title>Login - RinkSync</title>

    <!-- CSS -->
    <link rel="stylesheet" href="">

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap" rel="stylesheet">
    
    <!-- Boot-Icon -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Preload -->

</head>

<style>
    
    /* FONT */
    .audiowide-regular {
        font-family: "Audiowide", sans-serif;
        font-weight: 400;
        font-style: normal;
    }

    /* PAGE LAYOUT */
    * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
    }

    body {
        background-color: rgb(10, 74, 138);
    }

   .glass-nav {
        position: relative;
        width: 100%;
        height: 8vh;
        background: rgba(255,255,255,0.1);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        border: 1px solid rgba(255,255,255,0.3);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1), inset 0 1px 0 rgba(255,255,255, 0.5), inset 0 -1px 0 rgba(255,255,255,0.1), inset 0 0 20px 10px rgba(255,255,255,0);
        overflow: hidden;
        z-index: 10;
    }

    /* PROGRAM NAME STYLE */
    .nav-wrap > h1 {
        color: white;
        font-family: "Audiowide";
        font-size: 32px;
        font-weight: 200;
        margin-left: 2vw;
        align-self: center;
    }

    .glass-nav::before {
        content: '';
        top: 0;
        left: 0;
        right: 0;
        height: 1px;
        background: linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,0.8),
        transparent
        );
    }

    .glass-nav::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 1px;
        height: 100%;
        background: linear-gradient(
            180deg,
            rgba(255,255,255,0.8),
            transparent,
            rgba(255,255,255,0.3),
            transparent
        );
    }
    .nav-wrap {
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-self: center;
        width: 100%;
        height: 100%;
    }

    .nav-wrap > button {
        height: 50px;
        width: 150px;
        border-radius: 100px;
        border: none;
        align-self: center;
        margin-right: 2vw;
        position: relative;
        font-family: "Audiowide";
        text-align: center;

        /* GLASS LOOK */
        background: rgba(255,255,255,0.1);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        border: 1px solid rgba(255,255,255,0.3);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1), inset 0 1px 0 rgba(255,255,255, 0.5), inset 0 -1px 0 rgba(255,255,255,0.1), inset 0 0 20px 10px rgba(255,255,255,0);
        overflow: hidden;
        transition: all 0.3s ease;
    }

    .nav-wrap > button:hover {
        filter: brightness(80%);
    }

    .nav-wrap > button > img {
        height: 40px;
        width: 40px;
        border-radius: 50%;
        background: red;
        border: 2px solid black;
        position: absolute;
        left: 5px;
        top: 5px;
    }
    
      
 






    

</style>

<body>

    <!-- NAVBAR -->

    <nav class="glass-nav">


        <div class="nav-wrap">
        <!-- PROGRAM NAME -->

        <h1>RinkSync</h1>

        <!-- PROFILE BUTTON + SETTINGS + LOGOUT -->

        <button><img src="" alt="">Profile</button>
</div>


    </nav>

</body>






</html>
